<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - SkillConnect</title>
    <style>
        @import url('https://fonts.googleapis.com/css?family=Poppins:800,500,600,700&display=swap');

        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
          font-family: 'Poppins', sans-serif;
        }

        body {
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          background: #4070f4;
          position: relative; /* Added to position the video */
          overflow: hidden; /* Ensure the video doesn't overflow */
        }
        /* Video background */
        .background-video {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          object-fit: cover; /* Ensure the video covers the entire background */
          z-index: -1; /* Place the video behind the content */
        }

        .wrapper {
          position: relative;
          max-width: 830px;
          width: 100%;
          background: rgba(255, 255, 255, 0.51);
          padding: 34px;
          border-radius: 10px;
          box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }

        .wrapper h2 {
          position: relative;
          font-size: 22px;
          font-weight: 600;
          color: #333;
        }

        .wrapper h2::before {
          content: '';
          position: absolute;
          left: 0;
          bottom: 0;
          height: 3px;
          width: 28px;
          border-radius: 12px;
          background:rgba(255, 255, 255, 0.42);
        }

        .wrapper form {
          margin-top: 30px;
        }

        .input-box {
          height: 52px;
          margin: 18px 0;
        }

        form .input-box input {
          height: 100%;
          width: 100%;
          outline: none;
          padding: 0 15px;
          font-size: 17px;
          font-weight: 400;
          color: #333;
          border: 1.5px solid #C7BEBE;
          border-bottom-width: 2.5px;
          border-radius: 6px;
          transition: all 0.3s ease;
        }

        .input-box input:focus,
        .input-box input:valid {
          border-color:rgba(255, 255, 255, 0.42);
        }

        .form-label {
          font-size: 14px;
          color: #200;
        }

        .form-text {
          font-size: 12px;
          color: #777;
        }

        .btn {
          width: 100%;
          padding: 12px;
          background-color:rgba(255, 255, 255, 0.63); 
          border: none;
          color: white;
          border-radius: 4px;
          font-size: 16px;
          cursor: pointer;
        }

        .btn:hover {
          background-color:rgba(183, 102, 155, 0.8);
        }

        .text {
          text-align: center;
          margin-top: 20px;
        }

        .text h3 {
          color: #333;
        }

        .text h3 a {
          color:rgb(92, 34, 34);
          text-decoration: none;
        }

        .text h3 a:hover {
          text-decoration: underline;
        }

        /* Added margin to move the Register button down */
        .input-box.button {
          margin-top: 30px; /* Adjust this value to move the button further down */
        }

    </style>
</head>

<body>
  <!-- Background Video -->
  <video class="background-video" autoplay muted loop>
    <source src="/videos/register_video.mp4" type="video/mp4">
    Your browser does not support the video tag.
</video>

<div class="wrapper">
    <h2>Register Now</h2>
    <form action="/register" method="POST">
        <!-- Full Name -->
        <div class="input-box">
            <label for="name" class="form-label">Full Name</label>
            <input type="text" class="form-control" id="name" name="fullName" required aria-describedby="nameHelp" placeholder="Enter your name" >
        </div>

        <!-- Email -->
        <div class="input-box">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email" required aria-describedby="emailHelp">
        </div>

        <!-- State -->
        <div class="input-box">
            <label for="state" class="form-label">State</label>
            <input type="text" class="form-control" id="state" name="state" required placeholder="Enter your state">
        </div>

        <!-- City -->
        <div class="input-box">
            <label for="city" class="form-label">City</label>
            <input type="text" class="form-control" id="city" name="city" required placeholder="Enter your city">
        </div>

        <!-- Password -->
        <div class="input-box">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password"
                   pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&#])[A-Za-z\d@$!%*?&#]{8,16}$"
                   placeholder="Password must be 8-16 characters long, include uppercase, lowercase, a number, and a special character." required style="font-size: 13.5px;">
        </div>

        <!-- Submit Button -->
        <div class="input-box button">
            <input type="submit" value="Register Now" class="btn">
        </div>

        <!-- Login Link -->
        <div class="text">
            <h3>Already have an account? <a href="/login">Login now</a></h3>
        </div>
    </form>
</div>

<script>
    document.querySelector("form").addEventListener("submit", function (event) {
        const emailInput = document.getElementById("email");
        const emailPattern = /^[a-zA-Z0-9._%+-]+@(gmail\.com|email\.com)$/;

        if (!emailPattern.test(emailInput.value)) {
            event.preventDefault(); // Prevent form submission
            alert("Please enter a valid email address ending with @gmail.com or @email.com");
        }
    });
</script>

</body>
</html>
