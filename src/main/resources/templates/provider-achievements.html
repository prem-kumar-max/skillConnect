<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achievements</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
			background-image: url('/images/myachiviments.png'); /* Replace with your image URL */
			background-size: cover;
			background-position: center;
			background-attachment: fixed;
			background-repeat: no-repeat;
		}
        .carousel-item video, .carousel-item img {
            max-height: 300px;
            object-fit: cover;
        }
    </style>
</head>
<body>
<!-- Navbar -->
<nav th:insert="fragments/provider-header.html" class="navbar navbar-expand-lg navbar-dark bg-primary"></nav>

<!-- Achievements Section -->
<div class="container mt-4">
    <h2 class="mb-4">My Achievements</h2>
    <div class="row">
        <!-- Achievement Cards -->
        <div class="col-md-4 mb-4" th:each="achievement : ${achievements}">
            <div class="card shadow-sm">
                <!-- Carousel for Multiple Media -->
                <div th:id="'carousel-' + ${achievement.id}" class="carousel slide" data-bs-ride="carousel">
                    <div class="carousel-inner">
                        <!-- Media Items -->
                        <div class="carousel-item" th:each="media, stat : ${achievement.image}" th:classappend="${stat.index == 0} ? 'active' : ''">
                            <div th:if="${media.endsWith('.mp4') || media.endsWith('.avi') || media.endsWith('.mov') || media.endsWith('.mkv')}">
                                <video class="d-block w-100" th:src="@{http://localhost:1212{media}(media=${media})}" controls></video>
                            </div>
                            <div th:if="${media.endsWith('.jpg') || media.endsWith('.jpeg') || media.endsWith('.png') || media.endsWith('.gif')}">
                                <img class="d-block w-100" th:src="@{http://localhost:1212{media}(media=${media})}" alt="Achievement Media">
                            </div>
                        </div>
                    </div>
                    <!-- Carousel Controls -->
                    <button class="carousel-control-prev" type="button" th:data-bs-target="'#carousel-' + ${achievement.id}" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Previous</span>
                    </button>
                    <button class="carousel-control-next" type="button" th:data-bs-target="'#carousel-' + ${achievement.id}" data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Next</span>
                    </button>
                </div>
                <div class="card-body">
                    <h5 class="card-title" th:text="${achievement.achievementName}"></h5>
                    <p class="card-text" th:text="${achievement.description}"></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
