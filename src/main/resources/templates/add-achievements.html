<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillConnect - Add Achievement</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            min-height: 100vh;
        }
        body {
			background-image: url('/images/add.png'); /* Replace with your image URL */
			background-size: cover;
			background-position: center;
			background-attachment: fixed;
			background-repeat: no-repeat;
		}
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        label {
            font-weight: bold;
            color: #555;
        }
        .btn-primary {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            transition: all 0.3s ease-in-out;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #2575fc, #6a11cb);
            transform: scale(1.05);
        }
        input, textarea {
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        input:focus, textarea:focus {
            border-color: #2575fc;
            box-shadow: 0 0 5px rgba(37, 117, 252, 0.5);
            outline: none;
        }
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
<nav th:insert="fragments/provider-header.html" class="navbar navbar-expand-lg navbar-dark bg-primary"></nav>
<br>
<br>
<br>
<div class="container">
    <h1 class="text-center">Add Achievement</h1>
    <form action="/achievements/add" method="POST" enctype="multipart/form-data">
        <div class="mb-3">
            <label for="achievementName" class="form-label">Achievement Name</label>
            <input type="text" class="form-control" id="achievementName" name="achievementName" placeholder="Enter achievement name" required>
        </div>

        <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea class="form-control" id="description" name="description" rows="3" placeholder="Enter description" required></textarea>
        </div>

        <div class="mb-3">
            <label for="media" class="form-label">Upload Media (Images/Videos)</label>
            <input type="file" class="form-control" id="media" name="media" accept=".jpg,.jpeg,.png,.gif,.mp4,.avi,.mov,.mkv" multiple required>
        </div>

        <button type="submit" class="btn btn-primary w-100">Add Achievement</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
