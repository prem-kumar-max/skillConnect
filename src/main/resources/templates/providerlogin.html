<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Provider Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #89f7fe, #66a6ff);
            font-family: Arial, sans-serif;
            color: #333;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        body {
            background-image: url('/images/providerlogin.png'); /* Replace with your image URL */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
        .login-container {
            max-width: 400px;
            background-color: rgba(244, 244, 244, 0.2);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            animation: fadeIn 1s ease-in-out;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color:linear-gradient(90deg, rgba(2,0,36,1) 0%, rgba(9,9,121,1) 35%, rgba(0,212,255,1) 100%);
        }
        .form-label {
            font-weight: 600;
        }
        .form-control {
            border-radius: 8px;
            box-shadow: none;
            border: 1px solid #ddd;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .btn {
            border-radius: 8px;
            padding: 12px;
            font-size: 16px;
            background-color:#aa0056;
            transition: background-color 0.3s ease, transform 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
            background-color:rgb(2,0,36);
        }
        .form-control:focus {
            border-color:rgb(255, 0, 47);
            box-shadow: 0 0 0 0.25rem rgba(0, 123, 255, 0.25);
        }
        .forgot-password {
            font-size: 0.875rem;
            text-align: center;
            margin-top: 15px;
        }
        .forgot-password a {
            color: #007bff;
            text-decoration: none;
        }
        .forgot-password a:hover {
            text-decoration: underline;
        }
        .register-link a {
            color:rgb(2,0,36);
            text-decoration: none;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<!-- Login Container -->
<div class="login-container">
    <h2>Provider Login</h2>
    <center><p class="text-danger"><span th:text="${message}"></span></p></center>

    <!-- Login Form -->
    <form action="/providerlogin" method="POST">
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
        </div>

        <!-- Login Button -->
        <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>

    <!-- Link to Register if No Account -->
    <p class="mt-3 text-center register-link">Don't have an account? <a href="/register-professional">Register here</a></p>

<!--    &lt;!&ndash; Forgot Password Link &ndash;&gt;-->
<!--    <div class="forgot-password">-->
<!--        <p><a href="/forgot-password">Forgot Password?</a></p>-->
<!--    </div>-->
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
