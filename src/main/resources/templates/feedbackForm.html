<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Feedback Form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body {
            background-image: url('/images/feedbackform.svg'); /* Replace with your image URL */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
        .card{
        border:1px solid gray;
        border-radius:5px;
        padding:10px;
        margin:auto;
     width:350px;
     display:flex;
     justify-content:center;
     align-items:center;

        }

        .star-rating {
            direction: rtl;
            display: inline-block;
        }
        .star-rating input {
            display: none;
        }
        .star-rating label {
            font-size: 30px;
            color: lightgray;
            cursor: pointer;
        }
        .star-rating input:checked ~ label {
            color: gold;
        }
        .star-rating label:hover,
        .star-rating label:hover ~ label {
            color: gold;
        }
        .submit-btn{
        padding:10px;
        background-color:rgb(2,0,36);
        color:white;
        border-radius:10px;
        

        }
      
        .rate{
            display:flex;
            justify-content:center;
            align-items:center;
            padding: 10px;
        }
        .header{
            text-align:center;
            padding:10px;
            color:blue;
        }
        #description{
            width:100%;
            height:100px;
            border-radius: 10px;
            border:1px solid gray;
            padding:10px;
            outline: none;
        }
        .container{
          
            height: 100vh;
          background-color: rgba(241, 242, 243, 0.08);
        }

    </style>
</head>
<body>
    <div class=" container">
<h1 class="header" style="color: white;">Feedback Form</h1>
<div class="card">
    <form th:action="@{'/savefeedback/' + ${providerId}}" th:object="${feedback}" method="post">
        <div class="rate">
            <div class="star-rating">
                <input type="radio" id="star5" value="5" th:field="*{rating}" required />
                <label for="star5" class="fas fa-star"></label>
                <input type="radio" id="star4" value="4" th:field="*{rating}" />
                <label for="star4" class="fas fa-star"></label>
                <input type="radio" id="star3" value="3" th:field="*{rating}" />
                <label for="star3" class="fas fa-star"></label>
                <input type="radio" id="star2" value="2" th:field="*{rating}" />
                <label for="star2" class="fas fa-star"></label>
                <input type="radio" id="star1" value="1" th:field="*{rating}" />
                <label for="star1" class="fas fa-star"></label>
            </div>
        </div>
        <br>
        <label for="description">Description:</label><br>
        <textarea id="description" rows="4" cols="30" th:field="*{description}" required></textarea><br><br>
        <button type="submit" class="submit-btn">Submit Feedback</button>
    </form>
</div></div>
<div th:if="${message}">
   <p th:text="${message}"></p>
</div>
</body>
</html>
