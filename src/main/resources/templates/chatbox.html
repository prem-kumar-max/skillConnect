<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Box</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Custom styles for the chat box */
        .chat-container {
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid #ccc;
            border-radius: 10px;
            padding: 20px;
        }

        .message-box {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 10px;
            margin-bottom: 15px;
            background-color: #f9f9f9;
            border-radius: 10px;
        }

        .message {
            margin-bottom: 15px;
        }

        .message .sender {
            font-weight: bold;
        }

        .message .content {
            margin-top: 5px;
        }

        .message-input {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }

        .send-button {
            margin-top: 10px;
        }

    </style>
</head>
<body>
    <div class="container mt-5 chat-container">
        <h2 class="text-center">Chat Box</h2>

        <!-- Messages Display Section -->
        <div class="message-box" id="messageBox">
            <!-- Example of a message -->
            <div class="message">
                <div class="sender">You:</div>
                <div class="content">Hello, I need some help with my booking.</div>
            </div>
            <div class="message">
                <div class="sender">Support:</div>
                <div class="content">Sure! How can I assist you today?</div>
            </div>
        </div>

        <!-- Message Input Section -->
        <div class="input-group">
            <textarea class="message-input" id="messageInput" placeholder="Type your message here..." rows="3"></textarea>
        </div>
        <button class="btn btn-primary send-button" id="sendMessageButton">Send</button>
    </div>

    <script>
        // Basic functionality for sending a message
        document.getElementById("sendMessageButton").addEventListener("click", function() {
            const messageInput = document.getElementById("messageInput");
            const messageBox = document.getElementById("messageBox");

            // Get the message from the input field
            const message = messageInput.value.trim();

            // Only send if the message is not empty
            if (message) {
                // Add the new message to the message box
                const newMessage = document.createElement("div");
                newMessage.classList.add("message");

                const senderDiv = document.createElement("div");
                senderDiv.classList.add("sender");
                senderDiv.textContent = "You:";

                const contentDiv = document.createElement("div");
                contentDiv.classList.add("content");
                contentDiv.textContent = message;

                newMessage.appendChild(senderDiv);
                newMessage.appendChild(contentDiv);

                // Append the new message to the message box
                messageBox.appendChild(newMessage);

                // Clear the input field
                messageInput.value = "";

                // Scroll to the bottom of the message box
                messageBox.scrollTop = messageBox.scrollHeight;
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
