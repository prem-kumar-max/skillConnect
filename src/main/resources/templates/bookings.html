<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Details</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav th:insert="fragments/header.html" class="navbar navbar-expand-lg navbar-light bg-light"></nav>

    <div class="container mt-5">
        <h2 class="mb-4">Booking Details</h2>

        <!-- Bootstrap Table -->
        <table class="table table-striped table-bordered">
            <thead class="thead-dark">
                <tr>
                    <th scope="col">Booking Date</th>
                    <th scope="col">Booking Time</th>
                    <th scope="col">Service provider Name</th>
                    <th scope="col">Category</th>
                    <th scope="col">Charge</th>
					<th scope="col">Status</th>
                    <!--th scope="col">Action</th-->
                </tr>
            </thead>
            <tbody>
                <!-- Thymeleaf iteration to display each booking -->
                <tr th:each="booking : ${bookings}">
                    <td th:text="${booking.date}">Date</td>
                    <td th:text="${booking.time}">Time</td>
                    <td th:text="${booking.name}">Service Name</td>
                    <td th:text="${booking.category}">Category</td>
                    <td th:text="${booking.charge}">Charge</td>
					<td th:text="${booking.status}">Charge</td>
					<td>
					    <!-- Cancel button >
					    <form th:action="@{/deleteBooking}" method="post">
					        <input type="hidden" th:value="${booking.id}" name="bookingId">
					        <button type="submit" class="btn btn-danger btn-sm">Cancel</button>
					    </form-->
					</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Bootstrap JS (Optional) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
