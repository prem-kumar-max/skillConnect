<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Provider Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
        background-color: #f4f4f4;
    }
    .profile-card {
        max-width: 500px;
        margin: 50px auto;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .profile-image {
        width: 150px;
        height: 150px;
        margin: 0 auto;
        border-radius: 50%;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
    }
    .profile-details {
        display: grid;
        grid-template-columns: 1fr 2fr;
        gap: 10px;
    }
    .profile-details strong {
        text-align: right;
    }
    .profile-card .card-header {
        background-color: #007bff;
        color: white;
    }
    .alert-warning {
        font-size: 1.1rem;
    }
  </style>
</head>
<body>
<!-- Bootstrap Navbar -->

  <nav th:insert="fragments/provider-header.html" class="navbar navbar-expand-lg navbar-dark bg-primary"></nav>

<!-- Profile Card -->
<div class="container">
  <div class="card profile-card">
    <div class="card-header text-center">
      <h3>Provider Profile</h3>
    </div>
    <div class="card-body text-center">
      <!-- Profile Image -->
      <div>
        <img th:src="@{'http://localhost:1212/images/' + ${provider.profileImageUrl}}" alt="Profile Image" class="profile-image" />
      </div>

      <!-- Profile Details -->
      <div class="profile-details mt-3" th:if="${provider != null}">
        <strong>Full Name:</strong>
        <span th:text="${provider.fullName}"></span>

        <strong>Email:</strong>
        <span th:text="${provider.email}"></span>

        <strong>Phone:</strong>
        <span th:text="${provider.phone}"></span>

        <strong>State:</strong>
        <span th:text="${provider.state}"></span>

        <strong>City:</strong>
        <span th:text="${provider.city}"></span>

        <strong>Category:</strong>
        <span th:text="${provider.category}"></span>

        <strong>Charge per Service:</strong>
        <span th:text="${'$' + #numbers.formatDecimal(provider.chargePerService, 0, 2)}"></span>

      </div>

      <!-- No provider details available alert -->
      <div th:unless="${provider != null}" class="alert alert-warning text-center mt-3">
        No provider details available
      </div>
    </div>
  </div>
</div>
</div>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
