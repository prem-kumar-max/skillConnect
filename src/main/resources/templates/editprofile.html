<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Provider Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Service Provider Registration</h1>
        <center><p th:text="${error}" style="color: red;"></p></center>

        <form action="/updateprovider" method="POST">
            <!-- Basic Information Fields -->
            <div class="mb-3">
                <label for="fullName" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="fullName" name="fullName" placeholder="Enter your full name" required th:value="${provider.fullName}">
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required th:value="${provider.email}" readonly>
            </div>
            <div class="mb-3">
                <label for="phone" class="form-label">Phone Number</label>
                <input type="tel" class="form-control" id="phone" name="phone" placeholder="Enter your phone number" required th:value="${provider.phone}" readonly>
            </div>

            <!-- Manual Location Fields -->
            <div class="mb-3">
                <label for="state" class="form-label">State</label>
                <select class="form-select" id="stateSelect" name="state" onchange="updateCities()" required th:value="${provider.state}">
                    <option value="">Select State</option>
                    <option value="Andhra Pradesh" th:selected="${provider.state == 'Andhra Pradesh'}">Andhra Pradesh</option>
                    <option value="Arunachal Pradesh" th:selected="${provider.state == 'Arunachal Pradesh'}">Arunachal Pradesh</option>
                    <option value="Assam" th:selected="${provider.state == 'Assam'}">Assam</option>
                    <option value="Bihar" th:selected="${provider.state == 'Bihar'}">Bihar</option>
                    <option value="Chhattisgarh" th:selected="${provider.state == 'Chhattisgarh'}">Chhattisgarh</option>
                    <option value="Goa" th:selected="${provider.state == 'Goa'}">Goa</option>
                    <option value="Gujarat" th:selected="${provider.state == 'Gujarat'}">Gujarat</option>
                    <option value="Haryana" th:selected="${provider.state == 'Haryana'}">Haryana</option>
                    <option value="Himachal Pradesh" th:selected="${provider.state == 'Himachal Pradesh'}">Himachal Pradesh</option>
                    <option value="Jharkhand" th:selected="${provider.state == 'Jharkhand'}">Jharkhand</option>
                    <option value="Karnataka" th:selected="${provider.state == 'Karnataka'}">Karnataka</option>
                    <option value="Kerala" th:selected="${provider.state == 'Kerala'}">Kerala</option>
                    <option value="Madhya Pradesh" th:selected="${provider.state == 'Madhya Pradesh'}">Madhya Pradesh</option>
                    <option value="Maharashtra" th:selected="${provider.state == 'Maharashtra'}">Maharashtra</option>
                    <option value="Manipur" th:selected="${provider.state == 'Manipur'}">Manipur</option>
                    <option value="Meghalaya" th:selected="${provider.state == 'Meghalaya'}">Meghalaya</option>
                    <option value="Mizoram" th:selected="${provider.state == 'Mizoram'}">Mizoram</option>
                    <option value="Nagaland" th:selected="${provider.state == 'Nagaland'}">Nagaland</option>
                    <option value="Odisha" th:selected="${provider.state == 'Odisha'}">Odisha</option>
                    <option value="Punjab" th:selected="${provider.state == 'Punjab'}">Punjab</option>
                    <option value="Rajasthan" th:selected="${provider.state == 'Rajasthan'}">Rajasthan</option>
                    <option value="Sikkim" th:selected="${provider.state == 'Sikkim'}">Sikkim</option>
                    <option value="Tamil Nadu" th:selected="${provider.state == 'Tamil Nadu'}">Tamil Nadu</option>
                    <option value="Telangana" th:selected="${provider.state == 'Telangana'}">Telangana</option>
                    <option value="Tripura" th:selected="${provider.state == 'Tripura'}">Tripura</option>
                    <option value="Uttar Pradesh" th:selected="${provider.state == 'Uttar Pradesh'}">Uttar Pradesh</option>
                    <option value="Uttarakhand" th:selected="${provider.state == 'Uttarakhand'}">Uttarakhand</option>
                    <option value="West Bengal" th:selected="${provider.state == 'West Bengal'}">West Bengal</option>
                    <!-- Union Territories -->
                    <option value="Andaman and Nicobar Islands" th:selected="${provider.state == 'Andaman and Nicobar Islands'}">Andaman and Nicobar Islands</option>
                    <option value="Chandigarh" th:selected="${provider.state == 'Chandigarh'}">Chandigarh</option>
                    <option value="Dadra and Nagar Haveli and Daman and Diu" th:selected="${provider.state == 'Dadra and Nagar Haveli and Daman and Diu'}">Dadra and Nagar Haveli and Daman and Diu</option>
                    <option value="Lakshadweep" th:selected="${provider.state == 'Lakshadweep'}">Lakshadweep</option>
                    <option value="Delhi" th:selected="${provider.state == 'Delhi'}">Delhi</option>
                    <option value="Puducherry" th:selected="${provider.state == 'Puducherry'}">Puducherry</option>
                    <option value="Ladakh" th:selected="${provider.state == 'Ladakh'}">Ladakh</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="city" class="form-label">City</label>
                <select class="form-select" id="citySelect" name="city" required th:value="${provider.city}">
                    <option value="">Select City</option>
                    <!-- Cities will be updated dynamically based on state selection -->
                </select>
            </div>

            <!-- Category Selection Field -->
            <div class="mb-3">
                <label for="category" class="form-label">Category</label>
                <select class="form-select" id="category" name="category" required th:value="${provider.category}">
                    <option value="" disabled selected>Select Category</option>
                    <option value="Cooking" th:selected="${provider.category == 'Cooking'}">Cooking</option>
                    <option value="Homemaking" th:selected="${provider.category == 'Homemaking'}">Homemaking</option>
                    <option value="Tutoring" th:selected="${provider.category == 'Tutoring'}">Tutoring</option>
                    <option value="Music" th:selected="${provider.category == 'Music'}">Music</option>
                    <!-- Add more categories as necessary -->
                </select>
            </div>

            <!-- Charge per Service Field -->
            <div class="mb-3">
                <label for="charge" class="form-label">Charge per Service (in Rs)</label>
                <input type="number" class="form-control" id="charge" name="chargePerService" placeholder="Enter your charge per service" required th:value="${provider.chargePerService}">
            </div>

            <!-- Profile Image Upload -->
            <div class="mb-3">
                <label for="profileImage" class="form-label">Profile Image</label>
                <input type="text" class="form-control" id="profileImage" name="profileImageUrl" placeholder="Image URL" required th:value="${provider.profileImageUrl}">
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary">Update</button>
        </form>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const cities = {
            "Andhra Pradesh": ["Visakhapatnam", "Vijayawada", "Guntur", "Rajahmundry", "Tirupati"],
            "Arunachal Pradesh": ["Itanagar", "Tawang", "Naharlagun"],
            "Assam": ["Guwahati", "Dibrugarh", "Jorhat", "Silchar", "Nagaon"],
            "Bihar": ["Patna", "Gaya", "Bhagalpur", "Muzaffarpur", "Purnea"],
            "Chhattisgarh": ["Raipur", "Bhilai", "Korba", "Durg", "Bilaspur"],
            "Goa": ["Panaji", "Margao", "Vasco da Gama", "Mapusa", "Ponda"],
            "Gujarat": ["Ahmedabad", "Surat", "Vadodara", "Rajkot", "Bhavnagar"],
            "Haryana": ["Chandigarh", "Gurugram", "Faridabad", "Karnal", "Ambala"],
            "Himachal Pradesh": ["Shimla", "Kullu", "Manali", "Dharamshala", "Solan"],
            "Jharkhand": ["Ranchi", "Jamshedpur", "Dhanbad", "Bokaro", "Hazaribagh"],
            "Karnataka": ["Bengaluru", "Mysuru", "Hubballi", "Mangalore", "Belagavi"],
            "Kerala": ["Thiruvananthapuram", "Kochi", "Kozhikode", "Kottayam", "Thrissur"],
            "Madhya Pradesh": ["Bhopal", "Indore", "Gwalior", "Jabalpur", "Ujjain"],
            "Maharashtra": ["Mumbai", "Pune", "Nagpur", "Nashik", "Aurangabad"],
            "Manipur": ["Imphal", "Thoubal"],
            "Meghalaya": ["Shillong", "Tura", "Jowai"],
            "Mizoram": ["Aizawl", "Lunglei"],
            "Nagaland": ["Kohima", "Dimapur"],
            "Odisha": ["Bhubaneswar", "Cuttack", "Berhampur", "Rourkela", "Puri"],
            "Punjab": ["Chandigarh", "Amritsar", "Ludhiana", "Jalandhar", "Patiala"],
            "Rajasthan": ["Jaipur", "Udaipur", "Jodhpur", "Ajmer", "Bikaner"],
            "Sikkim": ["Gangtok", "Namchi"],
            "Tamil Nadu": ["Chennai", "Coimbatore", "Madurai", "Trichy", "Chidambaram"],
            "Telangana": ["Hyderabad", "Warangal", "Khammam", "Karimnagar", "Nizamabad"],
            "Tripura": ["Agartala", "Udaipur", "Dharmanagar"],
            "Uttar Pradesh": ["Lucknow", "Kanpur", "Varanasi", "Agra", "Meerut"],
            "Uttarakhand": ["Dehradun", "Haridwar", "Nainital", "Rishikesh", "Almora"],
            "West Bengal": ["Kolkata", "Darjeeling", "Siliguri", "Howrah", "Asansol"],
            "Andaman and Nicobar Islands": ["Port Blair"],
            "Chandigarh": ["Chandigarh"],
            "Dadra and Nagar Haveli and Daman and Diu": ["Daman", "Diu"],
            "Lakshadweep": ["Kavaratti"],
            "Delhi": ["New Delhi"],
            "Puducherry": ["Puducherry"],
            "Ladakh": ["Leh", "Kargil"]
        };

        function updateCities() {
            const state = document.getElementById("stateSelect").value;
            const citySelect = document.getElementById("citySelect");

            // Clear previous cities
            citySelect.innerHTML = "<option value=''>Select City</option>";

            // If state is selected, update city options
            if (state && cities[state]) {
                cities[state].forEach(city => {
                    const option = document.createElement("option");
                    option.value = city;
                    option.textContent = city;
                    citySelect.appendChild(option);
                });
            }
        }

        // Call updateCities on page load to populate cities
        window.onload = updateCities;
    </script>
</body>
</html>
