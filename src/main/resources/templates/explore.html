<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore - SkillConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        body {
            background-image: url('/images/achiviments.png'); /* Replace with your image URL */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            
        }
        .card {
            border: none;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background-color:rgb(2,0,36);
            color: white;
            border-radius: 15px 15px 0 0;
        }
        .profile-header img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
        }
        .card-img-top {
            height: 300px;
            object-fit: cover;
        }
        .carousel-inner img, .carousel-inner video {
            max-height: 300px;
            object-fit: cover;
        }
        .card-body {
            text-align: center;
        }
    </style>
</head>
<body>
<!-- Navbar -->
<nav th:insert="fragments/header.html" class="navbar navbar-expand-lg navbar-light bg-light"></nav>

<!-- Achievements Section -->
<div class="container mt-4">
    <h2 class="mb-4 text-center" style="color: white;">Explore Achievements</h2>
    <div class="row">
        <!-- Loop through achievements -->
        <div class="col-md-4 mb-4" th:each="achievement : ${achievements}">
            <div class="card">
                <!-- Profile Header -->
                <div class="profile-header">
                    <a th:href="@{'/bookProvider/' + ${achievement.provider.id}}" style="text-decoration: none; color: inherit;">
                        <img th:src="@{'/images/' + ${achievement.provider.profileImageUrl}}" alt="Provider Image">
                        <div>
                            <h6 class="mb-0" th:text="${achievement.provider.fullName}"></h6>
                            <small class="text-light" th:text="${achievement.provider.category}"></small>
                        </div>
                    </a>
                </div>


                <!-- Carousel for Achievement Media -->
                <div th:id="'carousel-' + ${achievement.id}" class="carousel slide" data-bs-ride="carousel">
                    <div class="carousel-inner">
                        <!-- Media Items -->
                        <div class="carousel-item" th:each="media, stat : ${achievement.image}" th:classappend="${stat.index == 0} ? 'active' : ''">
                            <div th:if="${media.endsWith('.mp4') || media.endsWith('.avi') || media.endsWith('.mov') || media.endsWith('.mkv')}">
                                <video class="d-block w-100" th:src="@{'http://localhost:1212' + ${media}}" controls></video>
                            </div>
                            <div th:if="${media.endsWith('.jpg') || media.endsWith('.jpeg') || media.endsWith('.png') || media.endsWith('.gif')}">
                                <img class="d-block w-100" th:src="@{'http://localhost:1212' + ${media}}" alt="Achievement Media">
                            </div>
                        </div>
                    </div>
                    <!-- Carousel Controls -->
                    <button class="carousel-control-prev" type="button" th:data-bs-target="'#carousel-' + ${achievement.id}" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Previous</span>
                    </button>
                    <button class="carousel-control-next" type="button" th:data-bs-target="'#carousel-' + ${achievement.id}" data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Next</span>
                    </button>
                </div>

                <!-- Achievement Details -->
                <div class="card-body">
                    <h5 class="card-title" th:text="${achievement.achievementName}"></h5>
                    <p class="card-text" th:text="${achievement.description}"></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
