<!DOCTYPE html>
<html lang="en" xmlns:th="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css"> <!-- Custom CSS -->
    <style>
        body {
           background-image: url('/images/profilebackground.png'); /* Replace with your image URL */
           background-size: cover;
           background-position: center;
           background-attachment: fixed;
           background-repeat: no-repeat;
           color: white; /* Set text color to white */
         }
         .btn-success {
            background-color:#aa0056; /* Custom green for Update Profile button */
            color: #fff;
            border: none;
        }
    
        .btn-success:hover {
            background-color:rgb(2,0,36);/* Darker shade on hover */
        }
    
        .btn-warning {
            background-color:#aa009e; /* Custom orange for Go to Dashboard button */
            color: #fff;
            border: none;
        }
    
        .btn-warning:hover {
            background-color:#9730d7; /* Darker shade on hover */
        }

      
  

     
   </style>
</head>
<body>

    <nav th:insert="fragments/header.html" class="navbar navbar-expand-lg navbar-light bg-light"></nav>

    <div class="container mt-4">
        <h2>User Profile</h2>
		<center><p style="color: yellow;"><span th:if="${message != null}" th:text="${message}"></span></p></center>
        <!-- Form for updating user profile -->
        <form action="/updateProfile" method="POST">
            <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input type="text" class="form-control" id="name" name="fullName" th:value="${user.fullName}" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" th:value="${user.email}" readonly>
            </div>
			<div class="mb-3">
			    <label for="city" class="form-label">State</label>
			    <input type="text" class="form-control" id="state" name="state" th:value="${user.state}" required>
			</div>
            <div class="mb-3">
                <label for="city" class="form-label">City</label>
                <input type="text" class="form-control" id="city" name="city" th:value="${user.city}" required>
            </div>
            <button type="submit" class="btn btn-success">Update Profile</button>

        </form>
    </div>

    <script>
        // Check if the success message exists in the model
        let message =  'null';
        if (message !== 'null') {
            alert(message); // Show the alert with the message
        }
    </script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
