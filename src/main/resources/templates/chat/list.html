<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - SkillConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-image: url('/images/chat.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        .error {
            border-color:red !important;
            border-width: 2 !important;
        }
        
        .container {
            background:linear-gradient(289deg, rgba(220,217,217,1) 0%, rgba(170,112,108,1) 100%, rgba(0,212,255,1) 100%);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .list-group-item {
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        .list-group-item:hover {
            background-color: #e3f2fd;
        }

        #chat-container {
            border: 1px solid #dee2e6;
            border-radius: 10px;
            padding: 10px;
            background:#dcd9d9;
        }

        .card {
            border: none;
        }

        .card-body {
            font-size: 0.9rem;
        }

        .btn-primary {
            transition: transform 0.2s ease;
        }

        .btn-primary:hover {
            transform: scale(1.05);
        }
        #sendBtn {
            background-color: rgb(2,0,36);
            border-color: #0056b3; /* Matching border */
            color: white;
        }
    
        #sendBtn:hover {
            background-color: #0056b3; /* Darker blue on hover */
        }
    </style>
</head>
<body>

<nav th:insert="fragments/header.html" class="navbar navbar-expand-lg navbar-light bg-light"></nav>

<!-- Main Section -->
<div class="container mt-5">

    <input id="userId" th:value="${userId}" class="form-control" placeholder="User Id" hidden/>
    <input id="providerId" th:value="${providerId}" class="form-control" placeholder="Provider Id" hidden/>

    <div class="row border border-dark" style="height:600px;overflow-y:auto;">
        <div class="col-3">
            <div class="list-group mt-2">
                <a th:each="prov: ${providers}"
                   th:text="${prov.getFullName()}"
                   th:href="@{/chat/list(id=${prov.getId()})}"
                   class="list-group-item list-group-item-success list-group-item-action" aria-current="true"></a>
            </div>
        </div>
        <div th:classappend="${#lists.isEmpty(messages) ? o :  'd-flex flex-column justify-content-end'}"
             class="col-9 border-1 border-start border-dark ">
            <h4 class="text-center" th:if="${#lists.isEmpty(messages)}">Send a message to start chatting</h4>
            <div id="chat-container" style="height:500px;overflow-y:scroll;">
                <div th:each="msg: ${messages}" class="d-flex"
                     th:classappend="${msg.senderId == userId ? 'justify-content-end' : 'justify-content-start'}">
                    <!-- User's message aligned to the right -->
                    <div th:classappend="${msg.senderId == userId ? 'bg-warning' : 'bg-info'}"
                         class="card w-25 my-1">
                        <div class="card-body">
                            <h6 class="card-text" th:text="${msg.getMessage()}"></h6>
                        </div>
                    </div>
                </div>
            </div>
            <div class="d-flex flex-col justify-content-between my-2" >
                <input
                        name="message"
                        id="message"
                        class="form-control w-75"
                        placeholder="Message..."
                />
                <button class="btn btn-primary max-w-25 w-25" id="sendBtn">Send</button>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="bg-light text-center py-3">
    <p>&copy; 2024 SkillConnect. All rights reserved.</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/jquery.min.js}"></script>
<script th:src="@{/js/chat.js}"></script>


</body>
</html>
