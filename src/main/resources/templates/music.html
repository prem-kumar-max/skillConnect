<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Providers - SkillConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            background-image: url('/images/music.jpg'); /* Replace with your image URL */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
        a{
        margin-bottom: 5px;
        }
    </style>
</head>
<body>
<!-- Navbar -->
<nav th:insert="fragments/header.html" class="navbar navbar-expand-lg navbar-light bg-light"></nav>

<!-- Main Section -->
<div class="container mt-5">
    <h2 th:if="${category != null}" class="mb-4" style="color: white;"><span th:text="${category}"></span> Professionals</h2>
    <h2 class="mb-4" th:if="${error != null}" th:text="${error}"></h2> <!-- Error message if available -->

    <div class="row">
        <!-- Loop through the list of providers -->
        <div th:each="provider : ${providers}" class="col-md-4 mb-4">
            <div class="card">
                <img th:src="@{'http://localhost:1212/images/' + ${provider.profileImageUrl}}"
                     class="card-img-top"
                     alt="Provider Image">
                <div class="card-body">
                    <h5 class="card-title" th:text="${provider.fullName}">Provider Name</h5>
                    <p class="card-text" th:text="'Specializes in ' + ${provider.category}">Specialization</p>

                    <p class="card-text" th:text="'Location: ' + ${provider.state} + ', ' + ${provider.city}">Location</p>
                    <p><strong>Charge per Service:</strong> ₹<span th:text="${provider.chargePerService}">Amount</span></p>
                    <!-- Contact and Book Now buttons -->
                    <!--a th:href="@{/chat/list(id=${provider.id})}" class="btn btn-primary">Contact</a-->
                    <a th:href="@{/bookserviceprovider(id=${provider.id})}" class="btn btn-success">Book Now</a>
<!--                    <a th:href="@{/create(id=${provider.id})}" class="btn btn-success">Feedback</a>-->
                    <a th:href="@{/details/{providerId}(providerId=${provider.id})}" class="btn btn-info">View Feedbacks</a>
                    <!-- Video Button -->
<!--                    <button class="btn btn-secondary" data-bs-toggle="modal" th:attr="data-bs-target='#videoModal-' + ${provider.id}">-->
<!--                        Videos-->
<!--                    </button>-->
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Video Modal -->
<div th:each="provider : ${providers}" th:id="'videoModal-' + ${provider.id}" class="modal fade" tabindex="-1" aria-labelledby="videoModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" th:text="'Videos of ' + ${provider.fullName}"></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <!-- Loop through the list of videos -->
<!--                    <div th:each="video : ${provider.videos}" class="col-md-6 mb-3">-->
<!--                        <video controls class="w-100">-->
<!--                            &lt;!&ndash; Correct video URL generation &ndash;&gt;-->
<!--                            <source th:src="@{'http://localhost:1212/video/' + ${video}}" type="video/mp4">-->
<!--                            Your browser does not support the video tag.-->
<!--                        </video>-->
<!--                    </div>-->
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="bg-light text-center py-3" style="margin-top: 200px">
    <p>&copy; 2024 SkillConnect. All rights reserved.</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Logic to check if the user is logged in (this should come from your backend)
    const isLoggedIn = false; // Set this value based on actual login status from the backend or session

    function handleButtonClick(event, action) {
        if (!isLoggedIn) {
            event.preventDefault(); // Prevent the default action
            alert("Please log in to use this feature."); // Show alert message
        }
    }
</script>
</body>
</html>
