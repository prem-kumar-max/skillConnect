<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1 class="mb-4">Feedback List</h1>
    <a href="/create" class="btn btn-primary mb-3">Submit Feedback</a>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Provider Name</th>
            <th>Rating</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
            <tr th:each="feedback : ${feedbackList}">
                <td th:text="${feedback.id}"></td>
                <td th:text="${feedback.providerName}"></td>
                <td th:text="${feedback.rating}"></td>
                <td>
                    <a th:href="@{/details/{id}(id=${feedback.id})}" class="btn btn-info btn-sm">View</a>
                    <a th:href="@{/edit/{id}(id=${feedback.id})}" class="btn btn-warning btn-sm">Edit</a>
                    <a th:href="@{/delete/{id}(id=${feedback.id})}" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure you want to delete this feedback?');">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
