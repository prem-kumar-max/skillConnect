<div class="container-fluid" xmlns:th="http://www.w3.org/1999/xhtml">
    <button th:if="${pageName != 'index' and pageName != 'login' and pageName != 'user_action'}" onclick="goBack()" class="btn btn-light me-3" style="border: none;">
        &larr;
    </button>
    <a class="navbar-brand" href="/">SkillConnect</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
            <!-- Home Link -->
            <li class="nav-item"
                onclick="redirectToLoginIfNeeded(event)">
                <a class="nav-link active text-dark fw-semibold" href="/">
                    <i class="bi bi-house-door"></i> Home
                </a>
            </li>
            <!-- Bookings Link -->
            <li class="nav-item" onclick="redirectToLoginIfNeeded(event)">
                <a class="nav-link text-dark fw-semibold" href="/booking/details">
                    <i class="bi bi-calendar2-check"></i> Bookings
                </a>
            </li>
            <!-- Explore Link -->
            <li class="nav-item" onclick="redirectToLoginIfNeeded(event)">
                <a class="nav-link text-dark fw-semibold" href="/get/all/achievements">
                    <i class="bi bi-compass"></i> Explore
                </a>
            </li>
        </ul>
        <div class="d-flex ms-auto">
            <!-- Chat Box Button -->
            <div class="d-flex ms-auto align-items-center">
                <!-- Chat Box Button -->
                <div th:if="${user != null}" class="d-flex align-items-center me-3">
                    <a th:href="@{/chat/list}" class="nav-link">
                        <img src="/images/chatbox.jpg" alt="Chat Icon" class="rounded-circle border border-secondary"
                             width="35" height="35">
                    </a>
                </div>

                <!-- Profile Icon -->
                <div th:if="${user != null}" class="d-flex align-items-center me-3">
                    <a href="/profile" class="nav-link">
                        <img src="/images/profile.jpg" alt="Profile Icon" class="rounded-circle border border-secondary"
                             width="35" height="35">
                    </a>
                </div>
            <!-- Login/Logout Button -->
                <div>
                    <a th:if="${user == null}" href="/login" class="btn btn-outline-success me-2">
                        <i class="bi bi-box-arrow-in-right"></i> Login
                    </a>
                    <a th:if="${user == null}" href="/providerlogin" class="btn btn-outline-info me-2">
                        <i class="bi bi-person"></i> Provider Login
                    </a>
                    <a th:if="${user != null}" href="/logout" class="btn btn-outline-danger">
                        <i class="bi bi-box-arrow-right"></i> Logout
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function goBack() {
        if (window.history.length > 1) {
            window.history.back();
        } else {
            // If there's no history, redirect to a fallback page (like the home page)
            window.location.href = '/';
        }
    }
</script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
