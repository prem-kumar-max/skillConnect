<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Provider</title>
    <link rel="stylesheet" href="/css/styles.css"> <!-- Link to your stylesheets -->
</head>
<body>
<div class="container">
    <h1>Are you sure you want to delete this provider?</h1>

    <!-- Display provider details if available -->
    <div th:if="${provider != null}">
        <p><strong>Provider Name:</strong> <span th:text="${provider.name}"></span></p>
        <p><strong>Provider ID:</strong> <span th:text="${provider.id}"></span></p>
    </div>

    <div th:if="${provider == null}">
        <p>No provider found to delete.</p>
    </div>

    <!-- Confirmation buttons -->
    <div class="buttons">
        <form th:action="@{/admin/confirmDelete}" method="post">
            <input type="hidden" name="providerId" th:value="${provider.id}"/> <!-- Hidden field for provider ID -->
            <button type="submit" class="btn-confirm">Confirm Delete</button>
        </form>
        <a href="/admin/providers" class="btn-cancel">Cancel</a> <!-- Redirect to list of providers -->
    </div>
</div>
</body>
</html>
