<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Booking Details</title>
	<!-- Bootstrap CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
	<style>
		body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, rgba(37, 117, 252, 0.8), rgba(106, 203, 255, 0.8)),
                url('https://source.unsplash.com/1600x900/?abstract,gradient');
            background-size: cover;
            background-position: center;
            font-family: 'Arial', sans-serif;
        }
		body {
			background-image: url('/images/acceptedbookins.png'); /* Replace with your image URL */
			background-size: cover;
			background-position: center;
			background-attachment: fixed;
			background-repeat: no-repeat;
		}
        .container {
            background: rgba(255, 255, 255, 0.66);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }
        h2 {
            color: #333;
            text-align: center;
            margin-bottom: 20px;
        }
        .table th, .table td {
            text-align: center;
            vertical-align: middle;
        }
        .btn-info {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            border: none;
            color: #fff;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-info:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(37, 117, 252, 0.5);
        }
	</style>
</head>
<body>
<nav th:insert="fragments/provider-header.html" class="navbar navbar-expand-lg navbar-dark bg-primary"></nav>
<div class="container mt-5">
	<h2 class="mb-4">Booking Details</h2>
	<table class="table table-striped table-bordered">
		<thead class="table-dark">
		<tr>
			<th scope="col">Booked by</th>
			<th scope="col">Booking Date</th>
			<th scope="col">Booking Time</th>
			<th scope="col">Category</th>
			<th scope="col">Charge</th>
			<th scope="col">Status</th>
			<th scope="col">Actions</th>
		</tr>
		</thead>
		<tbody>
		<!-- Thymeleaf iteration to display each booking -->
		<tr th:each="booking : ${bookings}">
			<td th:text="${booking.bookedBy}">Booked by</td>
			<td th:text="${booking.date}">Date</td>
			<td th:text="${booking.time}">Time</td>
			<td th:text="${booking.category}">Category</td>
			<td th:text="${booking.charge}">Charge</td>
			<td th:text="${booking.status}">Status</td>
			<td>
				<a class="btn btn-info btn-sm"
				   th:href="@{/booking/details/{id}(id=${booking.id})}">
					Details
				</a>
			</td>
		</tr>
		</tbody>
	</table>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
