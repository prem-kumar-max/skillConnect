<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cooking Providers - SkillConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            background-image: url('/images/search.png'); /* Rddeplace with your image URL */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        a{
        margin-bottom: 5px;
        }
    </style>
</head>
<body>

<nav th:insert="fragments/header.html" class="navbar navbar-expand-lg navbar-light bg-light"></nav>

<!-- Main Section -->
<div class="container mt-5">
    <h2 th:if="${category!= null}" class="mb-4"  style="color: white;"><span th:text="${category}"></span > Professionals</h2>
    <h2 class="mb-4"><span th:text="${error}"></span> </h2>
    <div class="row">
        <!-- Loop through the list of providers -->
        <div th:each="provider : ${providers}" class="col-md-4 mb-4">
            <div class="card">
                <img th:src="@{'http://localhost:1212/images/' + ${provider.profileImageUrl}}"
                     class="card-img-top"
                     alt="Provider Image">
                <div class="card-body">
                    <h5 class="card-title" th:text="${provider.fullName}">Provider Name</h5>
                    <p class="card-text" th:text="'Specializes in ' + ${provider.category}">Specialization</p>
                    <p class="card-text" th:text="'Location: ' + ${provider.state} + ', ' + ${provider.city}">Location</p>
                    <p><strong>Charge per Service:</strong> ₹<span th:text="${provider.chargePerService}">Amount</span></p>

                    <!-- Contact and Book Now buttons -->
                    <!--a th:href="@{/chat/list(id=${provider.id})}" class="btn btn-primary" onclick="handleButtonClick(event, 'contact')">Contact</a-->
                    <a th:href="@{/bookserviceprovider(id=${provider.id})}" class="btn btn-success" onclick="handleButtonClick(event, 'book')">Book Now</a>
                    <a th:href="@{/details/{providerId}(providerId=${provider.id})}" class="btn btn-info">View Feedbacks</a>

                </div>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="bg-light text-center py-3" style="margin-top: 200px">
    <p>&copy; 2024 SkillConnect. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
