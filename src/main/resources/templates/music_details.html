<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Providers - SkillConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html">SkillConnect</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
<!--            <ul class="navbar-nav ms-auto">-->
<!--                <li class="nav-item">-->
<!--                    <a class="nav-link" href="explore.html">Explore</a>-->
<!--                </li>-->
<!--                <li class="nav-item">-->
<!--                    <a class="nav-link" href="login.html">Login</a>-->
<!--                </li>-->
<!--                <li class="nav-item">-->
<!--                    <a class="nav-link" href="chatbox.html">Chat</a>-->
<!--                </li>-->
<!--            </ul>-->
        </div>
    </div>
</nav>

<!-- Main Section -->
<div class="container mt-5">
    <!-- Dynamic Category Heading -->
    <h2 th:if="${category != null}" class="mb-4"><span th:text="${category}"></span> Professionals</h2>
    <h2 class="mb-4" th:if="${error != null}" th:text="${error}"></h2> <!-- Error message if available -->

    <div class="row">
        <!-- Loop through the list of providers -->
        <div th:each="providers : ${providers}" class="col-md-4 mb-4">
            <div class="card">
                <!-- Use dynamic image URL with a fallback to a default image if not available -->
                <img th:src="@{'http://localhost:1212/images/' + ${provider.profileImageUrl}}"
                     class="card-img-top"
                     alt="Provider Image">
                <div class="card-body">
                    <!-- Provider Name -->
                    <h5 class="card-title" th:text="${providers.fullName}">Provider Name</h5>

                    <!-- Specialization Category -->
                    <p class="card-text" th:text="'Specializes in ' + ${providers.category}">Specialization</p>

                    <!-- Description (this can be added to the provider model if needed) -->
                    <p class="card-text">Description goes here</p>

                    <!-- Location (State and City) -->
                    <p class="card-text" th:text="'Location: ' + ${providers.state} + ', ' + ${providers.city}">Location</p>

                    <!-- Charge per Service -->
                    <p><strong>Charge per Service:</strong> ₹<span th:text="${providers.chargePerService}">Amount</span></p>

                    <!-- Rating (you can replace this with dynamic rating data if available) -->
                    <p><strong>Rating:</strong> ⭐⭐⭐⭐⭐</p>

                    <!-- Contact and Book Now buttons -->
                    <a href="/chatbox.html" class="btn btn-primary" onclick="handleButtonClick(event, 'contact')">Contact</a>
                    <a th:href="@{/bookserviceprovider(id=${providers.id})}" class="btn btn-success" onclick="handleButtonClick(event, 'book')">Book Now</a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="bg-light text-center py-3" style="margin-top: 200px">
    <p>&copy; 2024 SkillConnect. All rights reserved.</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
